<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body { background:#f5f7fa; }
    .card { border-radius:15px; }
  </style>
</head>

<body>

<nav class="navbar navbar-dark bg-dark px-3">
  <span class="navbar-brand">Student Manager</span>
  <a href="/logout" class="btn btn-danger">Logout</a>
</nav>

<div class="container mt-4">

  <div class="row">
    
    <!-- Add Student -->
    <div class="col-md-4">
      <div class="card p-3 shadow">
        <h5>Add Student</h5>

        <input id="name" class="form-control mb-2" placeholder="Name">
        <input id="email" class="form-control mb-2" placeholder="Email">

        <button onclick="addStudent()" class="btn btn-success w-100">
          Add Student
        </button>
      </div>
    </div>

    <!-- Student List -->
    <div class="col-md-8">
      <div class="card p-3 shadow">
        <div class="d-flex justify-content-between">
          <h5>Students</h5>
          <button onclick="loadStudents()" class="btn btn-primary btn-sm">
            Refresh
          </button>
        </div>

        <table class="table mt-3">
          <thead>
            <tr>
              <th>ID</th>
              <th>Name</th>
              <th>Email</th>
            </tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>

      </div>
    </div>

  </div>

</div>

<script src="/static/script.js"></script>
</body>
</html>
